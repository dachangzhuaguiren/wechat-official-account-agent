services:
  - type: web
    name: wechat-official-account-agent-api
    runtime: node
    buildCommand: npm test
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "1"
      - key: AGENT_PROVIDER_MODE
        value: openai-compatible
      - key: AGENT_BASE_URL
        value: https://api.deepseek.com
      - key: AGENT_MODEL
        value: deepseek-v4-flash
      - key: AGENT_MODEL_QUALITY
        value: deepseek-v4-pro
      - key: AGENT_THINKING_MODE
        value: operation-based
      - key: AGENT_TIMEOUT_MS
        value: "60000"
      - key: ALLOWED_ORIGINS
        value: https://k8w98rr595-blip.github.io
      - key: RATE_LIMIT_MAX
        value: "20"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: AGENT_API_KEY
        sync: false
      - key: AGENT_ACCESS_TOKEN
        sync: false
